app = "bx-platform"
primary_region = "fra"

[build]

[env]
PORT = "8080"

[processes]
app = "python -m uvicorn main:app --host 0.0.0.0 --port 8080"

[[services]]
internal_port = 8080
protocol = "tcp"
processes = ["app"]

  [[services.ports]]
  port = 80
  handlers = ["http"]

  [[services.ports]]
  port = 443
  handlers = ["tls", "http"]
