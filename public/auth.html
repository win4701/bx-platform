<-- ================= AUTH SYSTEM ================-->
<div id="authOverlay" class="auth">

  <div class="auth-card">

    <!-- BRAND -->
    <div class="auth-brand">
      <img src="assets/images/blx.png">
      <span>Bloxio</span>
    </div>

    <!-- HEADER -->
    <div class="auth-head">
      <h2 id="authTitle">Welcome Back</h2>
      <p id="authSub">Login to your account</p>
    </div>

    <!-- FORM -->
    <div class="auth-body">

      <!-- LOGIN -->
      <div id="loginBox" class="auth-form active">
        <input id="loginEmail" type="email" placeholder="Email">
        <input id="loginPass" type="password" placeholder="Password">
        <button id="loginBtn" class="auth-btn">Login</button>
      </div>

      <!-- REGISTER -->
      <div id="registerBox" class="auth-form">
        <input id="regEmail" type="email" placeholder="Email">
        <input id="regPass" type="password" placeholder="Password">
        <input id="regPhone" type="text" placeholder="Phone number">
        <input id="regRef" type="text" placeholder="Referral (optional)">
        <button id="registerBtn" class="auth-btn">Create Account</button>
      </div>

    </div>

    <!-- ERROR -->
    <div id="authError" class="auth-error"></div>

    <!-- SWITCH -->
    <div class="auth-switch">
      <span id="switchText">Don't have account?</span>
      <button id="toggleAuth">Sign up</button>
    </div>

  </div>

</div>
