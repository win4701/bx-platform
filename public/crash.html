<section id="casino" class="view">

  <div id="casino-root">

    <!-- 🎮 3D LOBBY -->
    <div id="casino-3d"></div>

    <!-- ================= HUD ================= -->
    <div class="casino-hud">

      <div class="casino-topbar">
        <h2>🎰 Bloxio Casino</h2>
        <div id="casinoWalletText">0 BX</div>
      </div>

      <div class="casino-stats">
        <span>👥 <b id="casinoOnlineText">0</b></span>
        <span>💰 <b id="casinoVolumeText">0 BX</b></span>
      </div>

      <div id="casinoFeed" class="casino-feed"></div>

    </div>

    <!-- ================= GAMES GRID ================= -->
    <div id="casino-games" class="casino-games">

      <!-- 🎲 Dice -->
      <button class="game-card" data-game="dice">
        <img src="assets/casino/dice.png">
        <span>🎲 Dice</span>
      </button>

      <!-- 📈 Crash -->
      <button class="game-card" data-game="crash">
        <img src="assets/casino/crash.png">
        <span>📈 Crash</span>
      </button>

      <!-- 🔻 Plinko -->
      <button class="game-card" data-game="plinko">
        <img src="assets/casino/plinko.png">
        <span>🔻 Plinko</span>
      </button>

      <!-- 💣 Mines -->
      <button class="game-card" data-game="mines">
        <img src="assets/casino/mines.png">
        <span>💣 Mines</span>
      </button>

      <!-- 🎰 Slots -->
      <button class="game-card" data-game="slots">
        <img src="assets/casino/slot.png">
        <span>🎰 Slots</span>
      </button>

      <!-- 🪙 Coinflip -->
      <button class="game-card" data-game="coinflip">
        <img src="assets/casino/coinflip.png">
        <span>🪙 Coinflip</span>
      </button>

      <!-- 🎡 Roulette -->
      <button class="game-card" data-game="roulette">
        <img src="assets/casino/roulette.png">
        <span>🎡 Roulette</span>
      </button>

      <!-- 🃏 Blackjack -->
      <button class="game-card" data-game="blackjack">
        <img src="assets/casino/blackjack.png">
        <span>🃏 Blackjack</span>
      </button>

      <!-- ⬆️ HiLo -->
      <button class="game-card" data-game="hilo">
        <img src="assets/casino/hilo.png">
        <span>⬆️ Hi-Lo</span>
      </button>

      <!-- 🎯 Limbo -->
      <button class="game-card" data-game="limbo">
        <img src="assets/casino/limbo.png">
        <span>🎯 Limbo</span>
      </button>

      <!-- 🎡 Wheel -->
      <button class="game-card" data-game="wheel">
        <img src="assets/casino/wheel.png">
        <span>🎡 Wheel</span>
      </button>

      <!-- 🔢 Keno -->
      <button class="game-card" data-game="keno">
        <img src="assets/casino/keno.png">
        <span>🔢 Keno</span>
      </button>

    </div>

    <!-- ================= GAME STAGE ================= -->
    <div id="casino-stage" class="hidden">

      <!-- 🎥 GAME CANVAS -->
      <div id="game-canvas"></div>

      <!-- 🎯 GAME UI -->
      <div id="game-ui"></div>

      <!-- 🎛 BET PANEL -->
      <div id="bet-panel">

        <div class="bet-controls">
          <button id="betMinus">-</button>
          <input id="betInput" value="10">
          <button id="betPlus">+</button>
        </div>

        <button id="betBtn" class="bet-btn">BET</button>

      </div>

      <!-- 💥 FX LAYER -->
      <div id="fx-layer"></div>

      <!-- 🔙 BACK -->
      <button id="exitGame" class="exit-btn">← Back</button>

    </div>

  </div>

</section>
