<section id="casino" class="view">

  <div id="casino-root">

    <!-- 🎮 3D BACKGROUND -->
    <div id="casino-3d"></div>

    <!-- ================= HEADER ================= -->
    <div class="casino-header">

      <div class="left">
        <h2>🎰 Bloxio Casino</h2>
      </div>

      <div class="center">
        <span>👥 <b id="casinoOnlineText">0</b></span>
        <span>💰 <b id="casinoVolumeText">0</b></span>
      </div>

      <div class="right">
        <span id="casinoWalletText">0 BX</span>
      </div>

    </div>

    <!-- ================= MAIN ================= -->
    <div class="casino-layout">

      <!-- ================= GAME AREA ================= -->
      <div class="game-area">

        <!-- 🎰 GAME GRID -->
        <div id="casino-games" class="game-grid">

          <button class="game-card" data-game="dice">
            <img src="assets/casino/dice.png">
            <span>Dice</span>
          </button>

          <button class="game-card" data-game="crash">
            <img src="assets/casino/crash.png">
            <span>Crash</span>
          </button>

          <button class="game-card" data-game="plinko">
            <img src="assets/casino/plinko.png">
            <span>Plinko</span>
          </button>

          <button class="game-card" data-game="mines">
            <img src="assets/casino/mines.png">
            <span>Mines</span>
          </button>

          <button class="game-card" data-game="slots">
            <img src="assets/casino/slots.png">
            <span>Slots</span>
          </button>

          <button class="game-card" data-game="coinflip">
            <img src="assets/casino/coinflip.png">
            <span>Coinflip</span>
          </button>

          <button class="game-card" data-game="blackjack">
            <img src="assets/casino/blackjack.png">
            <span>Blackjack</span>
          </button>

          <button class="game-card" data-game="hilo">
            <img src="assets/casino/hilo.png">
            <span>HiLo</span>
          </button>

          <button class="game-card" data-game="limbo">
            <img src="assets/casino/limbo.png">
            <span>Limbo</span>
          </button>

          <button class="game-card" data-game="fruitparty">
            <img src="assets/casino/fruitparty.png">
            <span>FruitParty</span>
          </button>

          <button class="game-card" data-game="bananafarm">
            <img src="assets/casino/bananafarm.png">
            <span>BananaFarm</span>
          </button>

          <button class="game-card" data-game="airboss">
            <img src="assets/casino/airboss.png">
            <span>AirBoss</span>
          </button>

        </div>

        <!-- 🎮 GAME STAGE -->
        <div id="casino-stage" class="hidden">

          <div id="game-canvas"></div>

          <div id="game-ui"></div>

          <!-- 📡 LIVE BETS -->
          <div id="liveBets" class="live-bets"></div>

          <button id="exitGame" class="exit-btn">← Back</button>

        </div>

      </div>

      <!-- ================= BET PANEL ================= -->
      <div class="bet-panel">

        <div class="bet-box">

          <label>Bet Amount</label>

          <div class="bet-controls">
            <button id="betHalf">½</button>
            <button id="betMinus">-</button>
            <input id="betInput" value="10">
            <button id="betPlus">+</button>
            <button id="betDouble">2x</button>
          </div>

        </div>

        <!-- 🎯 OPTIONS -->
        <div id="game-options"></div>

        <!-- ⚡ ACTION -->
        <div class="bet-actions">
          <button id="betBtn" class="bet-btn">BET</button>
          <button id="autoBtn" class="auto-btn">AUTO</button>
        </div>

        <!-- 📈 MULTIPLIER -->
        <div id="multiplierBox">
          <span id="multiplier">1.00x</span>
        </div>

        <!-- 👥 PLAYERS -->
        <div id="playerList"></div>

      </div>

    </div>
    <!-- 💥 FX -->
    <div id="fx-layer"></div>
  </div>

    </section>
